<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1216">
<title>OBDAI CarChat</title>
<style>
  :root {
    --bg: #0f1216; --panel: #171c22; --panel2: #1e252d; --line: #2a333d;
    --text: #e7edf3; --dim: #8a97a6; --accent: #37c8f0; --accent2: #1f9ed1;
    --user: #23405a; --tool: #2a2f27; --warn: #f0a437; --err: #e0564b;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100dvh; }

  header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: var(--panel); border-bottom: 1px solid var(--line); }
  header .logo { font-weight: 800; letter-spacing: .5px; color: var(--accent); }
  header .car { flex: 1; min-width: 0; }
  header .car .name { font-size: 14px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  header .car .sub { font-size: 11px; color: var(--dim); }
  header .badge { font-size: 10px; padding: 2px 7px; border-radius: 999px;
    background: var(--panel2); color: var(--dim); border: 1px solid var(--line); }
  header .badge.sim { color: var(--warn); border-color: var(--warn); }
  header button.icon { background: none; border: none; color: var(--dim);
    font-size: 20px; padding: 6px; cursor: pointer; }
  header .car { cursor: pointer; }

  .banner { padding: 8px 14px; font-size: 13px; text-align: center;
    background: rgba(224,86,75,.15); color: #f0a89f; border-bottom: 1px solid var(--err); }

  #connect { position: fixed; inset: 0; z-index: 20; background: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 24px; }
  #connect[hidden] { display: none; }
  .cwrap { width: 100%; max-width: 420px; }
  .clogo { color: var(--accent); font-weight: 800; letter-spacing: 1px; font-size: 20px;
    text-align: center; }
  .ctitle { text-align: center; color: var(--dim); margin: 6px 0 22px; }
  .cbtn { display: block; width: 100%; margin: 10px 0; padding: 15px 16px; font: inherit;
    text-align: left; border-radius: 14px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); cursor: pointer; }
  .cbtn:active { border-color: var(--accent2); }
  .cbtn.ghost { background: transparent; color: var(--dim); }
  .cbtn.dev { font-size: 14px; }
  .cstatus { margin-top: 16px; text-align: center; color: var(--dim); font-size: 13px;
    min-height: 20px; white-space: pre-wrap; }
  .cstatus.err { color: var(--err); }
  .cback { color: var(--accent); background: none; border: none; font: inherit;
    cursor: pointer; margin-top: 12px; }

  #log { flex: 1; overflow-y: auto; padding: 16px 12px 6px; display: flex;
    flex-direction: column; gap: 12px; }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .bubble { max-width: 86%; padding: 10px 13px; border-radius: var(--radius);
    white-space: pre-wrap; word-wrap: break-word; }
  .assistant .bubble { background: var(--panel2); border: 1px solid var(--line);
    border-top-left-radius: 4px; }
  .user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
  .bubble img { max-width: 100%; border-radius: 10px; margin: 6px 0 2px;
    display: block; }
  .bubble a { color: var(--accent); text-decoration: underline; word-break: break-all; }
  .bubble strong { color: #fff; font-weight: 700; }
  .bubble code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 5px;
    font-family: ui-monospace, Menlo, monospace; font-size: .9em; }
  .tools { font-size: 12px; color: var(--dim); margin: -4px 4px 0; }
  .tools .chip { display: inline-block; background: var(--tool); color: #b8c4a8;
    border-radius: 999px; padding: 1px 8px; margin: 2px 4px 0 0; font-size: 11px; }
  .note { text-align: center; color: var(--dim); font-size: 12px; padding: 6px; }
  .typing { color: var(--dim); font-style: italic; }

  #composer { border-top: 1px solid var(--line); background: var(--panel);
    padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  #quick { display: flex; gap: 6px; overflow-x: auto; padding: 0 2px 8px;
    scrollbar-width: none; }
  #quick::-webkit-scrollbar { display: none; }
  .qa { flex: 0 0 auto; background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px;
    font: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .qa:active { background: var(--accent2); color: #06222c; }
  .qa:disabled { opacity: .45; }

  #thumbs { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 2px 8px; }
  #thumbs:empty { display: none; }
  .thumb { position: relative; width: 60px; height: 60px; border-radius: 10px;
    overflow: hidden; border: 1px solid var(--line); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb button { position: absolute; top: -1px; right: -1px; width: 20px; height: 20px;
    border: none; border-radius: 0 0 0 8px; background: rgba(0,0,0,.65);
    color: #fff; font-size: 13px; line-height: 20px; cursor: pointer; }
  .inputrow { display: flex; align-items: flex-end; gap: 8px; }
  .inputrow textarea { flex: 1; resize: none; max-height: 140px; padding: 11px 12px;
    border-radius: 22px; border: 1px solid var(--line); background: var(--panel2);
    color: var(--text); font: inherit; outline: none; }
  .inputrow textarea:focus { border-color: var(--accent2); }
  .btn { flex: 0 0 auto; width: 44px; height: 44px; border-radius: 50%; border: none;
    font-size: 20px; cursor: pointer; display: grid; place-items: center; }
  .btn.attach { background: var(--panel2); color: var(--accent); border: 1px solid var(--line); }
  .btn.send { background: var(--accent); color: #06222c; font-weight: 700; }
  .btn:disabled { opacity: .45; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">OBDAI</span>
    <div class="car" id="carBox" title="Tap to correct the vehicle / VIN">
      <div class="name" id="carName">…</div>
      <div class="sub" id="carSub"></div>
    </div>
    <span class="badge" id="prov"></span>
    <button class="icon" id="newBtn" title="New session">✎</button>
  </header>

  <div id="banner" class="banner" hidden></div>

  <div id="connect" hidden>
    <div class="cwrap">
      <div class="clogo">OBDAI</div>
      <div class="ctitle">Connect to your car</div>
      <div id="cbody">
        <button class="cbtn" data-how="bluetooth">🔵  Bluetooth adapter</button>
        <button class="cbtn" data-how="usb">🔌  USB adapter</button>
        <button class="cbtn" data-how="wifi">📶  Wi-Fi adapter</button>
        <button class="cbtn ghost" data-how="sim">▶  Simulator (demo, no car)</button>
      </div>
      <div id="cstatus" class="cstatus"></div>
    </div>
  </div>

  <div id="log">
    <div class="note" id="hello">Connecting…</div>
  </div>

  <div id="composer">
    <div id="quick">
      <button class="qa" data-msg="Run a full diagnosis of this car: what's most likely wrong, the cheapest fix, and the parts I should buy.">🔧 Diagnose</button>
      <button class="qa" data-msg="Read the trouble codes and tell me what they mean for this car.">⚠️ Codes</button>
      <button class="qa" data-msg="Read the current live sensor values and tell me if anything looks off.">📊 Live data</button>
    </div>
    <div id="thumbs"></div>
    <div class="inputrow">
      <button class="btn attach" id="attachBtn" title="Add a photo">📎</button>
      <input type="file" id="file" accept="image/*" multiple hidden>
      <textarea id="text" rows="1" placeholder="Ask about the car… (attach a photo with 📎)"></textarea>
      <button class="btn send" id="sendBtn" title="Send">➤</button>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const log = $('#log'), textEl = $('#text'), thumbs = $('#thumbs');
let pending = [];       // [{name, thumb}]
let busy = false;

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function scroll(){ log.scrollTop = log.scrollHeight; }

// ---- transport ------------------------------------------------------------
// Desktop talks HTTP to the FastAPI server. Inside the Android app there is no
// server (FastAPI needs pydantic-core, which Chaquopy can't build), so the same
// calls go through Kotlin's @JavascriptInterface into obd_bridge.py. Both hit the
// identical handlers in obd_api.py, so the page behaves the same either way.
const NATIVE = (typeof AndroidBridge !== 'undefined' && AndroidBridge) ? AndroidBridge : null;
function nativeCall(action, payload){
  return JSON.parse(NATIVE.call(action, JSON.stringify(payload || {})));
}
async function httpPost(path, fields){
  const fd = new FormData();
  for(const [k,v] of Object.entries(fields||{})) if(v != null) fd.append(k, v);
  return (await fetch(path, {method:'POST', body:fd})).json();
}
function fileToB64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(',')[1] || '');
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

const api = {
  isNative: !!NATIVE,
  async status(){ return NATIVE ? nativeCall('status') : (await fetch('/api/status')).json(); },
  async vehicleSet(vehicle, vin){
    return NATIVE ? nativeCall('vehicle_set', {vehicle, vin})
                  : httpPost('/api/vehicle', {vehicle, vin}); },
  async pendingClear(){
    return NATIVE ? nativeCall('pending_clear') : httpPost('/api/pending/clear'); },
  async newSession(){
    return NATIVE ? nativeCall('new_session') : httpPost('/api/new'); },
  async upload(file){
    if(NATIVE) return nativeCall('upload', {filename: file.name, data_b64: await fileToB64(file)});
    const fd = new FormData(); fd.append('file', file);
    return (await fetch('/api/upload', {method:'POST', body:fd})).json(); },
  async chatStart(text){
    return NATIVE ? nativeCall('chat_start', {text}) : httpPost('/api/chat/start', {text}); },
  async poll(){
    return NATIVE ? nativeCall('poll') : httpPost('/api/chat/poll'); },
  // Native-only: pick and open the adapter, then boot the Python session on it.
  listBluetooth(){ return nativeCall('list_bluetooth'); },
  listUsb(){ return nativeCall('list_usb'); },
  connectBluetooth(mac){ return nativeCall('connect_bluetooth', {mac}); },
  connectUsb(deviceId){ return nativeCall('connect_usb', {deviceId}); },
  boot(opts){ return nativeCall('boot', Object.assign({provider:'claude'}, opts)); },
};

// yield once so a "Connecting…" paint lands before a blocking native call
const paint = () => new Promise(r => setTimeout(r, 40));

// Minimal, safe markdown for assistant replies: escape first (no HTML injection),
// then add links / bold / italic / code / bullets. Links open in a new tab.
function mdToHtml(s){
  let h = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
        (m,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t}</a>`);
  h = h.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g,
        (m,pre,u)=>`${pre}<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^\s*[-*]\s+/gm, '• ');
  return h;
}

function addBubble(role, html, imgs){
  const row = document.createElement('div'); row.className = 'row ' + role;
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = html;
  (imgs||[]).forEach(src => { const im=document.createElement('img'); im.src=src; b.appendChild(im); });
  row.appendChild(b); log.appendChild(row); scroll(); return b;
}
function addTools(names){
  if(!names || !names.length) return;
  const d = document.createElement('div'); d.className = 'tools';
  d.innerHTML = 'read the car: ' + names.map(n=>`<span class="chip">${esc(n)}</span>`).join('');
  log.appendChild(d); scroll();
}

async function refreshStatus(){
  const s = await api.status();
  $('#carName').textContent = s.vehicle;
  const bits = [];
  bits.push(s.vin ? ('VIN …' + s.vin.slice(-4)) : 'VIN not read');
  if(s.adapter) bits.push(s.adapter);
  $('#carSub').textContent = bits.join(' · ');
  $('#prov').textContent = s.provider + (s.simulated ? ' · SIM' : '');
  $('#prov').classList.toggle('sim', !!s.simulated);
  const hello = $('#hello');
  if(hello) hello.textContent = s.simulated
    ? 'Simulated demo data — not a real car. Ask anything, or tap 📎 to show a photo.'
    : 'Connected. Ask anything, or tap 📎 to show it a part / code / leak.';
}

function showBanner(msg){
  const b = $('#banner'); b.textContent = msg; b.hidden = false;
  clearTimeout(b._t); b._t = setTimeout(()=>{ b.hidden = true; }, 8000);
}

$('#carBox').onclick = async () => {
  const cur = $('#carName').textContent;
  const v = prompt('Correct the vehicle (or leave blank to keep):', cur);
  if(v === null) return;
  const vin = prompt('Correct the VIN (17 chars, or leave blank):', '');
  if(v === null && vin === null) return;
  const veh = (v && v.trim() && v.trim() !== cur) ? v.trim() : null;
  const vn  = (vin && vin.trim()) ? vin.trim() : null;
  if(!veh && !vn) return;
  const j = await api.vehicleSet(veh, vn);
  if(j.error){ showBanner(j.error); return; }
  refreshStatus();
};

function renderThumbs(){
  thumbs.innerHTML = '';
  pending.forEach((p, i) => {
    const t = document.createElement('div'); t.className = 'thumb';
    t.innerHTML = `<img src="${p.thumb}"><button data-i="${i}">×</button>`;
    thumbs.appendChild(t);
  });
  thumbs.querySelectorAll('button').forEach(b =>
    b.onclick = () => { pending.splice(+b.dataset.i,1); renderThumbs(); syncPending(); });
}
async function syncPending(){ if(pending.length===0) await api.pendingClear(); }

$('#attachBtn').onclick = () => $('#file').click();
$('#file').onchange = async e => {
  const files = [...e.target.files]; e.target.value='';
  for(const f of files){
    const j = await api.upload(f);
    if(j.error){ addBubble('assistant', '⚠️ '+esc(j.error)); continue; }
    pending.push({name: j.attachment.name, thumb: j.attachment.thumb});
    renderThumbs();
  }
};

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function send(){
  if(busy) return;
  const text = textEl.value.trim();
  if(!text && pending.length===0) return;
  busy = true; $('#sendBtn').disabled = true;
  document.querySelectorAll('.qa').forEach(b=>b.disabled=true);

  const imgs = pending.map(p => p.thumb);
  addBubble('user', esc(text) || '<span class="typing">(photo)</span>', imgs);
  textEl.value=''; textEl.style.height='auto';
  pending = []; renderThumbs();

  const typing = addBubble('assistant', '<span class="typing">reading the car…</span>');
  let toolsLine = null;                       // created lazily when the first tool fires
  try{
    const started = await api.chatStart(text);
    if(started && started.error) throw new Error(started.error);
    // One path for desktop and Android: poll for tool events, then the reply.
    for(;;){
      const p = await api.poll();
      for(const e of (p.events || [])){
        if(e.type !== 'tool') continue;
        if(!toolsLine){
          toolsLine = document.createElement('div'); toolsLine.className='tools';
          toolsLine.innerHTML = 'reading the car: ';
          typing.closest('.row').before(toolsLine);
        }
        const chip = document.createElement('span'); chip.className='chip';
        chip.textContent = e.name; toolsLine.appendChild(chip); scroll();
      }
      if(p.done){
        const j = p.result || {};
        typing.closest('.row').remove();
        addBubble('assistant', mdToHtml(j.reply || '(no reply)'));
        if(j.error === 'connection') showBanner('Adapter link lost — check the cable/Bluetooth and ignition.');
        break;
      }
      await sleep(300);
    }
  }catch(err){
    typing.innerHTML = '⚠️ ' + esc(''+err);
  }finally{
    busy=false; $('#sendBtn').disabled=false;
    document.querySelectorAll('.qa').forEach(b=>b.disabled=false);
    textEl.focus();
  }
}
// One-tap common asks — the things you actually want at the car.
document.querySelectorAll('.qa').forEach(b => b.onclick = () => {
  if(busy) return;
  textEl.value = b.dataset.msg;
  send();
});

$('#sendBtn').onclick = send;
textEl.addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
textEl.addEventListener('input', () => {
  textEl.style.height='auto'; textEl.style.height = Math.min(textEl.scrollHeight,140)+'px';
});

$('#newBtn').onclick = async () => {
  if(!confirm('Start a new session on this car?')) return;
  await api.newSession();
  log.querySelectorAll('.row, .tools').forEach(n=>n.remove());
  pending=[]; renderThumbs();
  const n=document.createElement('div'); n.className='note'; n.textContent='New session started.';
  log.appendChild(n);
};

// --------------------------------------------------------------------------
// Connect screen (Android): pick an adapter, then boot the Python session on it.
// On desktop the server already booted with its CLI flags, so this never shows.
// --------------------------------------------------------------------------
const connectEl = $('#connect'), cbody = $('#cbody'), cstatus = $('#cstatus');
function cmsg(t, err){ cstatus.textContent = t || ''; cstatus.classList.toggle('err', !!err); }

async function bootSession(opts, label){
  cmsg('Connecting to ' + label + '…');
  await paint();
  let r;
  try { r = api.isNative ? api.boot(opts) : {error: 'connect screen is Android-only'}; }
  catch(e){ r = {error: '' + e}; }
  if(r && r.error){ cmsg(r.error, true); showConnectMenu(); return; }
  connectEl.hidden = true;
  await refreshStatus();
}

function backButton(){
  const b = document.createElement('button');
  b.className = 'cback'; b.textContent = '‹ back';
  b.onclick = showConnectMenu;
  return b;
}

async function pickFromList(kind){
  cmsg('Scanning…'); await paint();
  const res = kind === 'bluetooth' ? api.listBluetooth() : api.listUsb();
  if(res.error){ cmsg(res.error, true); return; }
  const devices = res.devices || [];
  cbody.innerHTML = '';
  if(!devices.length){
    cmsg(kind === 'bluetooth'
      ? 'No paired Bluetooth adapters. Pair your ELM327 in Android Settings → Bluetooth first, then come back.'
      : 'No USB serial adapter detected. Plug it into the phone (USB-OTG) and accept the permission prompt.', true);
    cbody.appendChild(backButton());
    return;
  }
  cmsg('');
  for(const d of devices){
    const b = document.createElement('button'); b.className = 'cbtn';
    b.textContent = (kind === 'bluetooth' ? '🔵  ' : '🔌  ') + (d.name || d.mac || d.deviceId);
    b.onclick = async () => {
      cmsg('Opening ' + (d.name || 'adapter') + '…'); await paint();
      const c = kind === 'bluetooth' ? api.connectBluetooth(d.mac) : api.connectUsb(d.deviceId);
      if(c.error){ cmsg(c.error, true); return; }
      await bootSession({port: c.endpoint, simulate: false}, d.name || 'adapter');
    };
    cbody.appendChild(b);
  }
  cbody.appendChild(backButton());
}

function showConnectMenu(){
  cmsg('');
  cbody.innerHTML =
    '<button class="cbtn" data-how="bluetooth">🔵  Bluetooth adapter</button>' +
    '<button class="cbtn" data-how="usb">🔌  USB adapter</button>' +
    '<button class="cbtn" data-how="wifi">📶  Wi-Fi adapter</button>' +
    '<button class="cbtn ghost" data-how="sim">▶  Simulator (demo, no car)</button>';
  cbody.querySelectorAll('.cbtn').forEach(b => b.onclick = () => onHow(b.dataset.how));
}

async function onHow(how){
  if(how === 'sim') return bootSession({simulate: true, sim_car: 'audi'}, 'the simulator');
  if(how === 'bluetooth') return pickFromList('bluetooth');
  if(how === 'usb') return pickFromList('usb');
  if(how === 'wifi'){
    const host = prompt('WiFi adapter address (host:port)', '192.168.0.10:35000');
    if(!host) return;
    return bootSession({port: 'tcp:' + host, simulate: false}, host);
  }
}

async function init(){
  const s = await api.status();
  if(s.booted){ connectEl.hidden = true; await refreshStatus(); return; }
  // Not booted yet → show the connect screen (Android). On desktop this path
  // shouldn't happen, but if it does, offer the simulator as a safe default.
  connectEl.hidden = false;
  showConnectMenu();
}

init();
</script>
</body>
</html>
